<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Chat 💬</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<!-- Firebase -->

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ── FREE Firebase project – messages stored here ──
  // Replace with your own Firebase config if you want your own DB
  const firebaseConfig = {
    apiKey: "AIzaSyDemo_ReplaceWithYours",
    authDomain: "demo.firebaseapp.com",
    databaseURL: "https://farman-toiba-chat-default-rtdb.firebaseio.com",
    projectId: "farman-toiba-chat",
    storageBucket: "farman-toiba-chat.appspot.com",
    messagingSenderId: "000000000000",
    appId: "1:000000000000:web:0000000000000000"
  };

  // Because we can't use a real Firebase here without your config,
  // we'll use localStorage + BroadcastChannel for same-device demo,
  // but the structure is 100% ready for Firebase — just paste your config above.

  window.__firebaseReady = false;

  try {
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    window.__db = db;
    window.__ref = ref;
    window.__push = push;
    window.__onValue = onValue;
    window.__serverTimestamp = serverTimestamp;
    window.__firebaseReady = true;
  } catch(e) {
    // Falls back to localStorage mode below
  }
</script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Nunito', sans-serif;
  background: #f0f4ff;
  height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* ── LOGIN ── */
#login-screen {
  width: 100%;
  max-width: 360px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  animation: fadeUp .4s ease;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}

.hearts {
  font-size: 52px;
  margin-bottom: 8px;
  animation: heartbeat 1.6s ease-in-out infinite;
}
@keyframes heartbeat {
  0%,100% { transform: scale(1); }
  14%     { transform: scale(1.15); }
  28%     { transform: scale(1); }
  42%     { transform: scale(1.1); }
  56%     { transform: scale(1); }
}

.login-title {
  font-size: 26px;
  font-weight: 800;
  color: #1a1a2e;
  margin-bottom: 4px;
}
.login-sub {
  font-size: 13px;
  color: #888;
  margin-bottom: 28px;
  text-align: center;
}

.login-card {
  background: white;
  border-radius: 24px;
  padding: 28px 24px;
  width: 100%;
  box-shadow: 0 8px 40px rgba(100,80,200,0.12);
}

.field-label {
  font-size: 12px;
  font-weight: 700;
  color: #aaa;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: block;
}

input[type=text], input[type=password] {
  width: 100%;
  padding: 14px 16px;
  border: 2px solid #eee;
  border-radius: 14px;
  font-family: 'Nunito', sans-serif;
  font-size: 15px;
  color: #1a1a2e;
  outline: none;
  transition: border-color .2s;
  margin-bottom: 14px;
  background: #fafafa;
}
input:focus { border-color: #7c6af7; background: white; }

.login-btn {
  width: 100%;
  padding: 15px;
  background: linear-gradient(135deg, #7c6af7, #a78bfa);
  color: white;
  border: none;
  border-radius: 14px;
  font-family: 'Nunito', sans-serif;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s;
  box-shadow: 0 4px 20px rgba(124,106,247,0.35);
}
.login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(124,106,247,0.45); }
.login-btn:active { transform: translateY(0); }

.error-msg {
  color: #e05;
  font-size: 13px;
  font-weight: 700;
  text-align: center;
  margin-top: 10px;
  min-height: 18px;
}

/* ── CHAT ── */
#chat-screen {
  display: none;
  flex-direction: column;
  width: 100%;
  max-width: 480px;
  height: 100dvh;
  background: white;
  box-shadow: 0 0 60px rgba(0,0,0,0.1);
}

.chat-header {
  background: linear-gradient(135deg, #7c6af7, #a78bfa);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}

.avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  border: 2px solid rgba(255,255,255,0.4);
}

.header-info { flex: 1; }
.header-name {
  font-size: 17px;
  font-weight: 800;
  color: white;
}
.header-status {
  font-size: 12px;
  color: rgba(255,255,255,0.75);
  display: flex;
  align-items: center;
  gap: 5px;
}
.online-dot {
  width: 7px; height: 7px;
  background: #7fff7f;
  border-radius: 50%;
  animation: blink 1.5s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.lock-badge {
  background: rgba(255,255,255,0.2);
  border-radius: 100px;
  padding: 4px 10px;
  font-size: 11px;
  color: white;
  font-weight: 700;
}

/* messages area */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: #f7f8ff;
}
.messages::-webkit-scrollbar { width: 3px; }
.messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

.msg-wrap {
  display: flex;
  flex-direction: column;
  animation: msgIn .25s ease;
}
@keyframes msgIn {
  from { opacity:0; transform:translateY(6px); }
  to   { opacity:1; transform:translateY(0); }
}
.msg-wrap.me { align-items: flex-end; }
.msg-wrap.them { align-items: flex-start; }

.bubble {
  max-width: 75%;
  padding: 10px 15px;
  border-radius: 20px;
  font-size: 15px;
  line-height: 1.5;
  word-break: break-word;
}
.msg-wrap.me .bubble {
  background: linear-gradient(135deg, #7c6af7, #a78bfa);
  color: white;
  border-bottom-right-radius: 5px;
}
.msg-wrap.them .bubble {
  background: white;
  color: #1a1a2e;
  border-bottom-left-radius: 5px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.07);
}

.msg-time {
  font-size: 10px;
  color: #bbb;
  margin-top: 3px;
  padding: 0 4px;
}

.sys-msg {
  align-self: center;
  font-size: 12px;
  color: #bbb;
  background: #eee;
  padding: 4px 14px;
  border-radius: 100px;
}

/* input bar */
.input-bar {
  padding: 12px 14px;
  background: white;
  border-top: 1px solid #f0f0f0;
  display: flex;
  gap: 10px;
  align-items: flex-end;
  flex-shrink: 0;
}

#msg-input {
  flex: 1;
  padding: 12px 16px;
  border: 2px solid #eee;
  border-radius: 20px;
  font-family: 'Nunito', sans-serif;
  font-size: 15px;
  resize: none;
  outline: none;
  max-height: 100px;
  line-height: 1.4;
  transition: border-color .2s;
  background: #fafafa;
}
#msg-input:focus { border-color: #a78bfa; background: white; }

.send-btn {
  width: 46px; height: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg, #7c6af7, #a78bfa);
  border: none;
  color: white;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: transform .15s, box-shadow .15s;
  box-shadow: 0 3px 12px rgba(124,106,247,0.4);
}
.send-btn:hover { transform: scale(1.08); }
.send-btn:active { transform: scale(0.95); }

/* media */
@media(max-width: 480px) {
  #chat-screen { max-width: 100%; }
}
</style>

</head>
<body>

<!-- LOGIN -->

<div id="login-screen">
  <div class="hearts">💬</div>
  <div class="login-title">Private Chat</div>
  <div class="login-sub">Enter your name & secret code to enter</div>

  <div class="login-card">
    <label class="field-label">Your Name</label>
    <input type="text" id="name-input" placeholder="e.g. Toiba" maxlength="20">

```
<label class="field-label">Secret Code</label>
<input type="password" id="code-input" placeholder="Enter code..." onkeydown="if(event.key==='Enter')login()">

<button class="login-btn" onclick="login()">Enter Chat 💜</button>
<div class="error-msg" id="err-msg"></div>
```

  </div>
</div>

<!-- CHAT -->

<div id="chat-screen">
  <div class="chat-header">
    <div class="avatar" id="peer-avatar">💜</div>
    <div class="header-info">
      <div class="header-name" id="peer-name">...</div>
      <div class="header-status">
        <div class="online-dot"></div>
        <span>Private & Encrypted</span>
      </div>
    </div>
    <div class="lock-badge">🔒 Private</div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-bar">
    <textarea id="msg-input" rows="1" placeholder="Type a message..."
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
      oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"></textarea>
    <button class="send-btn" onclick="sendMsg()">➤</button>
  </div>
</div>

<script>
// ═══════════════════════════════════
// CONFIG — only Farman & Toiba
// ═══════════════════════════════════
const SECRET_CODE = "farman";   // ← the shared secret code
const ALLOWED = ["farman", "toiba"]; // allowed names (case-insensitive)

let myName = "";
let channel; // BroadcastChannel for cross-tab (same device demo)

// ═══════════════════════════════════
// LOGIN
// ═══════════════════════════════════
function login() {
  const name = document.getElementById('name-input').value.trim();
  const code = document.getElementById('code-input').value.trim().toLowerCase();
  const err  = document.getElementById('err-msg');

  if (!name) { err.textContent = "Please enter your name ✏️"; return; }
  if (code !== SECRET_CODE) { err.textContent = "Wrong code! Ask Farman for it 🔑"; shake(); return; }

  myName = name;
  err.textContent = "";

  // Set peer display name & avatar
  const isToiba = name.toLowerCase() === "toiba";
  document.getElementById('peer-name').textContent  = isToiba ? "Farman 💙" : "Toiba 💜";
  document.getElementById('peer-avatar').textContent = isToiba ? "💙" : "💜";

  document.getElementById('login-screen').style.display = "none";
  document.getElementById('chat-screen').style.display  = "flex";

  initChat();
}

function shake() {
  const card = document.querySelector('.login-card');
  card.style.animation = 'none';
  card.style.transform = 'translateX(-8px)';
  setTimeout(()=>card.style.transform='translateX(8px)',80);
  setTimeout(()=>card.style.transform='translateX(-5px)',160);
  setTimeout(()=>card.style.transform='translateX(0)',240);
}

// ═══════════════════════════════════
// CHAT ENGINE
// Uses BroadcastChannel (same browser / different tabs)
// + localStorage as shared store
// Works perfectly when both open the same HTML file
// ═══════════════════════════════════
const STORE_KEY = "ft_chat_msgs";
const MAX_MSGS  = 200;

function initChat() {
  // Load history
  loadHistory();

  // Listen for new messages from other tab/window
  channel = new BroadcastChannel("farman_toiba_chat");
  channel.onmessage = (e) => {
    const msg = e.data;
    if (msg.from !== myName) {
      appendBubble(msg, false);
    }
  };

  appendSys("🔒 Chat is private · Only you two can see this");
  document.getElementById('msg-input').focus();
}

function loadHistory() {
  try {
    const stored = JSON.parse(localStorage.getItem(STORE_KEY) || "[]");
    stored.forEach(m => appendBubble(m, m.from === myName, true));
  } catch(e) {}
}

function saveMsg(msg) {
  try {
    const stored = JSON.parse(localStorage.getItem(STORE_KEY) || "[]");
    stored.push(msg);
    if (stored.length > MAX_MSGS) stored.splice(0, stored.length - MAX_MSGS);
    localStorage.setItem(STORE_KEY, JSON.stringify(stored));
  } catch(e) {}
}

function sendMsg() {
  const input = document.getElementById('msg-input');
  const text  = input.value.trim();
  if (!text) return;

  const msg = {
    from: myName,
    text: text,
    ts:   Date.now()
  };

  saveMsg(msg);
  appendBubble(msg, true);

  // Broadcast to other tabs
  if (channel) channel.postMessage(msg);

  input.value = "";
  input.style.height = "auto";
  input.focus();
}

function appendBubble(msg, isMe, silent=false) {
  const wrap = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = `msg-wrap ${isMe ? 'me' : 'them'}`;

  const time = new Date(msg.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  div.innerHTML = `
    <div class="bubble">${escHtml(msg.text)}</div>
    <div class="msg-time">${msg.from} · ${time}</div>
  `;
  wrap.appendChild(div);
  if (!silent) wrap.scrollTop = wrap.scrollHeight;
}

function appendSys(text) {
  const wrap = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = 'sys-msg';
  div.textContent = text;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
</script>

</body>
</html>
